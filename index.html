<script>

// Firebase compat wrappers
var db_instance = null;
function getDb() { return db_instance || firebase.database(); }
function ref(db, path) { 
  if(typeof path === 'undefined') { path = db; return firebase.database().ref(path); }
  return firebase.database().ref(path); 
}
function onValue(refObj, callback, errCallback) {
  refObj.on('value', function(snap) { callback(snap); }, errCallback||function(){});
}
function set(refObj, val) { return refObj.set(val); }
function update(refObj, val) { return refObj.update(val); }
function remove(refObj) { return refObj.remove(); }
function push(refObj, val) { return refObj.push(val); }
function serverTimestamp() { return firebase.database.ServerValue.TIMESTAMP; }


// ── app.js – HerdenPro v2 · Alm-Edition ──────────────────────────────────────




// ══════════════════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════════════════
let db;
let kuehe={}, behandlungen={}, besamungen={}, zaehlSession=null;
let milchEintraege={}, weideTage={}, weiden={}, bauern={};
let saisonInfo=null;
let gruppen={}, fotos={}, zaehlVerlauf={}, chatNachrichten={}, kraftfutter={};
let _editStore = {}; // stores data for edit operations
let _chatName=localStorage.getItem('chatName')||'';
let currentView='dashboard', editId=null;
let _kalbungIds={};

// ══════════════════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════════════════
function initApp() {
  // Sofort rendern ohne Firebase
  render();
  try {
    const app = firebase.initializeApp(window.FIREBASE_CONFIG);
    db = firebase.database();
  } catch(e) { 
    document.getElementById('main-content').innerHTML = '<div class="empty-state" style="color:#e06040">Firebase-Fehler: '+e.message+'<br><small>Bitte Internetverbindung prüfen</small></div>';
    return; 
  }

  onValue(ref(db,'kuehe'),        s=>{ kuehe=s.val()||{};          render(); checkWartezeiten(); });
  onValue(ref(db,'behandlungen'), s=>{ behandlungen=s.val()||{};   render(); checkWartezeiten(); });
  onValue(ref(db,'besamungen'),   s=>{ besamungen=s.val()||{};     render(); });
  onValue(ref(db,'zaehlung'),     s=>{ zaehlSession=s.val();       render(); });
  onValue(ref(db,'milch'),        s=>{ milchEintraege=s.val()||{}; render(); });
  onValue(ref(db,'weideTage'),    s=>{ weideTage=s.val()||{};      render(); });
  onValue(ref(db,'weiden'),       s=>{ weiden=s.val()||{};         render(); });
  onValue(ref(db,'bauern'),       s=>{ bauern=s.val()||{};         render(); });
  onValue(ref(db,'saison'),       s=>{ saisonInfo=s.val();         render(); });
  onValue(ref(db,'journal'),      s=>{ journal=s.val()||{};        render(); });
  onValue(ref(db,'kontakte'),     s=>{ kontakte=s.val()||{};       render(); });
  onValue(ref(db,'gruppen'),       s=>{ gruppen=s.val()||{};        render(); });
  onValue(ref(db,'fotos'),         s=>{ fotos=s.val()||{};          render(); });
  onValue(ref(db,'chat'),           s=>{ chatNachrichten=s.val()||{}; renderChat(); });
  onValue(ref(db,'kraftfutter'),    s=>{ kraftfutter=s.val()||{};      render(); });
  onValue(ref(db,'zaehlVerlauf'),   s=>{ zaehlVerlauf=s.val()||{};   render(); });

  registerSW();
  requestNotificationPermission();
  setInterval(checkWartezeiten, 3600000);
  renderNav();
}

// ══════════════════════════════════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════════════════════════════════
window.navigate = function(view) {
  if(view==='chat') markChatRead();
  currentView=view; editId=null; _kalbungIds={};
  document.getElementById('mehr-menu').style.display='none';
  render();
  try{renderNav();}catch(e){}
};

// ══════════════════════════════════════════════════════════════════════════════
//  RENDER ROUTER
// ══════════════════════════════════════════════════════════════════════════════
function render() {
  const main=document.getElementById('main-content');
  if(!main) return;
  // Smooth transition
  main.style.opacity='0';
  main.style.transform='translateY(4px)';
  
  const map = {
    dashboard:    renderDashboard,
    herde:        renderHerde,
    'kuh-detail': renderKuhDetail,
    zaehlung:     renderZaehlung,
    behandlung:   renderBehandlung,
    reproduktion: renderBesamungModule,
    besamung:     renderBesamungModule,
    milch:        renderMilch,
    weide:        renderWeide,
    saison:       renderSaison,
    bestandsbuch: renderBestandsbuch,
    einstellungen:renderEinstellungen,
    journal:      renderJournal,
    alpung:       renderAlpung,
    kontakte:     renderKontakte,
    gruppen:      renderGruppen,
    kontrolle:    renderKontrolle,
    kalender:     renderKalender,
    statistik:    renderStatistik,
    backup:       renderBackup,
    suche:        renderSuche,
    chat:         renderChatPage,
    kraftfutter:  renderKraftfutter,
    bauern_menu:  renderBauernMenu,
    bauer_detail: renderBauerDetail,
  };
  main.innerHTML = (map[currentView]||renderDashboard)();
  attachListeners();
  
  // Animate in
  requestAnimationFrame(()=>{
    main.style.transition='opacity .18s ease,transform .18s ease';
    main.style.opacity='1';
    main.style.transform='translateY(0)';
    setTimeout(()=>{main.style.transition='';},200);
  });
}

// ══════════════════════════════════════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════════════════════════════════════
function renderDashboard() {
  const heute=Date.now();
  const kuhListe=Object.values(kuehe);
  const bListe=Object.values(behandlungen);
  const bsListe=Object.values(besamungen);
  const aufgetrieben=kuhListe.filter(k=>k.almStatus==='oben').length;
  const wzAbgelaufen=bListe.filter(b=>b.wartezeitEnde&&b.wartezeitEnde<=heute&&!b.warteAbgeschlossen);
  const wzBald=bListe.filter(b=>b.wartezeitEnde&&b.wartezeitEnde>heute&&b.wartezeitEnde<heute+3*86400000);
  const folgeFaellig=bListe.filter(b=>b.folgeTermin&&b.folgeTermin<=heute+2*86400000&&!b.folgeErledigt);
  const geburtenBald=bsListe.filter(b=>b.erwartetGeburt&&b.erwartetGeburt>heute&&b.erwartetGeburt<heute+14*86400000&&b.status==='tragend');
  const trockenBald=bsListe.filter(b=>b.trockenstell&&b.trockenstell>heute&&b.trockenstell<heute+7*86400000);
  const heuteDatum=isoDate(new Date());
  const heidiWeide=Object.values(weideTage).find(w=>w.datum===heuteDatum);
  const milchWerte=Object.values(milchEintraege).sort((a,b)=>b.datum-a.datum);
  const letztesMilch=milchWerte[0];
  const alerts=[...wzAbgelaufen,...wzBald,...folgeFaellig,...geburtenBald,...trockenBald];

  return `
    <div class="page-header">
      <h2>Übersicht</h2>
      <span class="date-chip">${new Date().toLocaleDateString('de-AT',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</span>
    </div>
    ${saisonInfo?.aktiv
      ? `<div class="saison-banner" onclick="navigate('saison')"><span>⛰ ${saisonInfo.alm||'Alm'} · Saison aktiv seit ${new Date(saisonInfo.auftriebDatum).toLocaleDateString('de-AT')}</span><span class="saison-count">${aufgetrieben}/${kuhListe.length} oben</span></div>`
      : `<div class="saison-banner saison-inaktiv" onclick="navigate('saison')">⛰ Keine aktive Saison – hier tippen</div>`}
    <div class="stats-grid">
      <div class="stat-card" onclick="navigate('herde')"><div class="stat-icon">🐄</div><div class="stat-num">${kuhListe.length}</div><div class="stat-label">Kühe</div></div>
      <div class="stat-card ${wzAbgelaufen.length?'stat-warn':''}" onclick="navigate('behandlung')"><div class="stat-icon">⚕</div><div class="stat-num">${bListe.filter(b=>b.aktiv).length}</div><div class="stat-label">Behandlung</div></div>
      <div class="stat-card" onclick="navigate('milch')"><div class="stat-icon">🥛</div><div class="stat-num">${letztesMilch?letztesMilch.gesamt+'L':'–'}</div><div class="stat-label">Letzte Milch</div></div>
      <div class="stat-card" onclick="navigate('weide')"><div class="stat-icon">🌿</div><div class="stat-num">${heidiWeide?(heidiWeide.kuhIds?.length||0):'–'}</div><div class="stat-label">Heute Weide</div></div>
    </div>

    ${alerts.length ? `
    <div class="section-title">⚠ Aktionen erforderlich</div>
    <div class="alert-list">
      ${wzAbgelaufen.map(b=>{const k=kuehe[b.kuhId];const id=Object.keys(behandlungen).find(x=>behandlungen[x]===b)||'';return`<div class="alert-item alert-red"><span class="alert-dot red"></span><div><b>Wartezeit abgelaufen</b><br><small>${k?k.name+' #'+k.nr:''} · ${b.medikament||''}</small></div><button class="btn-xs" onclick="wartezeitAbschliessen('${id}')">✓</button></div>`;}).join('')}
      ${wzBald.map(b=>{const k=kuehe[b.kuhId];const t=Math.ceil((b.wartezeitEnde-heute)/86400000);return`<div class="alert-item alert-orange"><span class="alert-dot orange"></span><div><b>Wartezeit endet in ${t} Tag${t===1?'':'en'}</b><br><small>${k?k.name+' #'+k.nr:''} · ${b.medikament||''}</small></div></div>`;}).join('')}
      ${folgeFaellig.map(b=>{const k=kuehe[b.kuhId];return`<div class="alert-item alert-orange" onclick="navigate('behandlung')"><span class="alert-dot orange"></span><div><b>Folgebehandlung fällig</b><br><small>${k?k.name+' #'+k.nr:''} · ${new Date(b.folgeTermin).toLocaleDateString('de-AT')}</small></div></div>`;}).join('')}
      ${geburtenBald.map(b=>{const k=kuehe[b.kuhId];return`<div class="alert-item alert-green" onclick="navigate('besamung')"><span class="alert-dot green"></span><div><b>Geburt erwartet</b><br><small>${k?k.name+' #'+k.nr:''} · ${new Date(b.erwartetGeburt).toLocaleDateString('de-AT')}</small></div></div>`;}).join('')}
      ${trockenBald.map(b=>{const k=kuehe[b.kuhId];return`<div class="alert-item alert-blue" onclick="navigate('besamung')"><span class="alert-dot blue"></span><div><b>Trockenstellung</b><br><small>${k?k.name+' #'+k.nr:''} · ${new Date(b.trockenstell).toLocaleDateString('de-AT')}</small></div></div>`;}).join('')}
    </div>` : `<div class="empty-state" style="padding:1rem">✓ Keine offenen Aktionen</div>`}
  `;
}

// ══════════════════════════════════════════════════════════════════════════════
//  SAISON
// ══════════════════════════════════════════════════════════════════════════════
function renderSaison() {
  const kuhListe=Object.entries(kuehe).sort((a,b)=>{const nA=parseInt(a[1].nr)||0,nB=parseInt(b[1].nr)||0;return nA-nB;});
  const oben=kuhListe.filter(([,k])=>k.almStatus==='oben');
  const vorzeitig=kuhListe.filter(([,k])=>k.almStatus!=='oben'&&k.vorzeitigAbtrieb);
  const unten=kuhListe.filter(([,k])=>k.almStatus!=='oben'&&!k.vorzeitigAbtrieb);
  const heute=Date.now();
  const tageOben = saisonInfo?.auftriebDatum ? Math.floor((heute - saisonInfo.auftriebDatum)/86400000) : 0;

  return `
    <div class="page-header"><h2>⛰ Saison</h2></div>

    ${!saisonInfo?.aktiv ? `
    <!-- ── KEINE AKTIVE SAISON ── -->
    <div style="text-align:center;padding:1.5rem 0 1rem">
      <div style="font-size:3rem;margin-bottom:.5rem">⛰</div>
      <div style="font-size:1.1rem;color:var(--gold);margin-bottom:.3rem">Saison noch nicht gestartet</div>
      <div style="font-size:.82rem;color:var(--text3);margin-bottom:1.5rem">Starte die Saison wenn die Kühe auf die Alm getrieben werden.</div>
    </div>
    <div class="card-section">
      <div class="section-label" style="margin-bottom:.6rem">AUFTRIEB ERFASSEN</div>
      <input id="s-alm" class="inp" placeholder="Almname (z.B. Vordere Alm)" style="margin-bottom:.5rem" value="${saisonInfo?.alm||''}" />
      <input id="s-datum" class="inp" type="date" value="${isoDate(new Date())}" style="margin-bottom:.8rem" />
      <button class="btn-primary btn-block" onclick="startSaison()">▶ Saison starten</button>
    </div>
    ` : `
    <!-- ── SAISON AKTIV ── -->

    <!-- Status-Banner -->
    <div style="background:rgba(91,168,92,.12);border:1.5px solid var(--green);border-radius:14px;padding:1rem 1.2rem;margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
        <span style="color:var(--green);font-weight:bold;font-size:.9rem">✓ Saison aktiv</span>
        <span style="font-size:.75rem;color:var(--text3)">Tag ${tageOben}</span>
      </div>
      <div style="font-size:1.1rem;color:var(--gold);margin-bottom:.3rem">${saisonInfo.alm||'Alm'}</div>
      <div style="font-size:.82rem;color:var(--text2)">
        Auftrieb: ${new Date(saisonInfo.auftriebDatum).toLocaleDateString('de-AT',{weekday:'long',day:'numeric',month:'long'})}
      </div>
    </div>

    <!-- Kühe Zähler -->
    <div class="stats-grid" style="margin-bottom:1rem">
      <div class="stat-card">
        <div class="stat-icon">⛰</div>
        <div class="stat-num">${oben.length}</div>
        <div class="stat-label">Kühe oben</div>
      </div>
      <div class="stat-card ${unten.length?'stat-warn':''}">
        <div class="stat-icon">🏠</div>
        <div class="stat-num">${unten.length}</div>
        <div class="stat-label">noch unten</div>
      </div>
    </div>

    <!-- Schritt-für-Schritt Anleitung -->
    <div class="section-title">Was kannst du hier tun?</div>
    <div class="card-section" style="margin-bottom:1rem">
      <div style="display:flex;flex-direction:column;gap:.7rem">
        <div style="display:flex;gap:.8rem;align-items:flex-start">
          <span style="font-size:1.3rem;flex-shrink:0">1️⃣</span>
          <div>
            <div style="font-size:.88rem;color:var(--text);font-weight:bold">Kühe aufgetrieben markieren</div>
            <div style="font-size:.75rem;color:var(--text3)">Jede Kuh einzeln oder alle auf einmal als „oben" markieren → Alpungstage laufen automatisch</div>
          </div>
        </div>
        <div style="display:flex;gap:.8rem;align-items:flex-start">
          <span style="font-size:1.3rem;flex-shrink:0">2️⃣</span>
          <div>
            <div style="font-size:.88rem;color:var(--text);font-weight:bold">Tägliche Kontrolle</div>
            <div style="font-size:.75rem;color:var(--text3)">Unter „Mehr → Tägliche Kontrolle" prüfen ob alle Kühe da sind</div>
          </div>
        </div>
        <div style="display:flex;gap:.8rem;align-items:flex-start">
          <span style="font-size:1.3rem;flex-shrink:0">3️⃣</span>
          <div>
            <div style="font-size:.88rem;color:var(--text);font-weight:bold">Am Ende der Saison: Abtrieb erfassen</div>
            <div style="font-size:.75rem;color:var(--text3)">Abtriebsdatum eintragen → Alpungstage werden für AMA/ÖPUL berechnet → Saisonbericht exportieren</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Kühe Verwaltung -->
    ${unten.length ? `
    <div class="section-title">Noch nicht aufgetrieben (${unten.length})</div>
    <div class="card-list" style="margin-bottom:.6rem">
      ${unten.map(([id,k])=>`
        <div class="list-card list-card-sm">
          <span class="nr-badge">#${k.nr}</span>
          <span class="list-card-title">${k.name||'–'}</span>
          <span style="font-size:.72rem;color:var(--text3);flex:1">${k.bauer||''}</span>
          <button class="btn-xs" onclick="setAlmStatus('${id}','oben')">↑ aufgetrieben</button>
        </div>`).join('')}
    </div>
    <button class="btn-secondary btn-block" style="margin-bottom:.8rem" onclick="alleAuftreiben()">↑ Alle als aufgetrieben markieren</button>
    ` : `<div class="empty-state" style="margin-bottom:.8rem">✓ Alle Kühe oben</div>`}

    <!-- Vorzeitig abgetrieben -->
    ${vorzeitig.length ? `
    <div class="section-title" style="color:var(--orange)">⚠ Vorzeitig abgetrieben (${vorzeitig.length})</div>
    <div class="card-list" style="margin-bottom:.8rem">
      ${vorzeitig.map(([id,k])=>{
        const vz=k.vorzeitigAbtrieb||{};
        const gl={krank:'Krank/Verletzt',trocken:'Trockengestellt',geburt:'Geburt',verkauf:'Verkauf',verhaltensauffaellig:'Verhaltensauffällig',sonstige:'Sonstiges'};
        return '<div class="list-card"><div class="list-card-left"><span class="nr-badge">#'+k.nr+'</span><div>'+
          '<div class="list-card-title">'+(k.name||'–')+'</div>'+
          '<div class="list-card-sub">'+(vz.datum?new Date(vz.datum).toLocaleDateString('de-AT'):'')+(vz.datum?' · ':'')+( gl[vz.grund]||vz.grund||'–')+'</div>'+
          (vz.notiz?'<div class="list-card-sub" style="font-style:italic">'+vz.notiz+'</div>':'')+
          '</div></div>'+
          '<button class="btn-xs" onclick="window.setAlmStatus(\''+id+'\',\'oben\')">↑ zurück</button></div>';
      }).join('')}
    </div>` : ''}

    ${oben.length ? `
    <div class="section-title">Auf der Alm (${oben.length})</div>
    <div class="card-list" style="margin-bottom:1rem">
      ${oben.map(([id,k])=>`
        <div class="list-card list-card-sm">
          <span class="nr-badge">#${k.nr}</span>
          <span class="list-card-title">${k.name||'–'}</span>
          <span style="font-size:.72rem;color:var(--text3);flex:1">${k.bauer||''}</span>
          <button class="btn-xs" onclick="showVorzeitigAbtrieb('${id}')">↓ vorzeitig</button>
          <button class="btn-xs-danger" onclick="setAlmStatus('${id}','unten')">↓ ab</button>
        </div>`).join('')}
    </div>` : ''}

    <!-- Abtrieb Button -->
    <div class="card-section" style="border-color:var(--orange)">
      <div style="font-size:.82rem;color:var(--text2);margin-bottom:.7rem">
        <b style="color:var(--orange)">Saisonende:</b> Wenn alle Kühe abgetrieben wurden, hier den Abtrieb erfassen. 
        Die Alpungstage werden dann berechnet.
      </div>
      <button class="btn-primary" style="background:var(--orange);width:100%" onclick="showAbtriebbForm()">
        ↓ Abtrieb erfassen & Saison beenden
      </button>
    </div>
    `}

    <!-- Abtrieb Form -->
    <div id="abtrieb-overlay" class="form-overlay" style="display:none">
      <div class="form-sheet">
        <div class="form-header"><h3>Abtrieb erfassen</h3><button class="close-btn" onclick="closeForm('abtrieb-overlay')">✕</button></div>
        <div class="form-body">
          <p style="font-size:.82rem;color:var(--text2);margin-bottom:.8rem">
            Nach dem Speichern wird die Saison beendet und die Alpungstage werden berechnet.
          </p>
          <label class="inp-label">Abtriebsdatum</label>
          <input id="ab-datum" class="inp" type="date" value="${isoDate(new Date())}" />
          <textarea id="ab-notiz" class="inp" rows="2" placeholder="Notizen (z.B. alle gesund, Wetter gut…)"></textarea>
          <div class="form-actions">
            <button class="btn-secondary" onclick="closeForm('abtrieb-overlay')">Abbrechen</button>
            <button class="btn-primary" onclick="saveAbtrieb()">Abtrieb speichern</button>
          </div>
        </div>
      </div>
    </div>
  `;
}
window.startSaison=async function(){const alm=document.getElementById('s-alm')?.value.trim();const datum=document.getElementById('s-datum')?.value;await set(ref(db,'saison'),{aktiv:true,alm,auftriebDatum:datum?new Date(datum).getTime():Date.now(),jahr:new Date().getFullYear()});};
window.beendeSaison=async function(){await update(ref(db,'saison'),{aktiv:false,abtriebtDatum:Date.now()});const u={};Object.keys(kuehe).forEach(id=>{u[`kuehe/${id}/almStatus`]='unten';});await update(ref(db),u);};
window.setAlmStatus=async(id,s)=>await update(ref(db,'kuehe/'+id),{almStatus:s});
window.alleAuftreiben=async function(){const u={};Object.keys(kuehe).forEach(id=>{u[`kuehe/${id}/almStatus`]='oben';});await update(ref(db),u);};
window.showAbtriebbForm=function(){document.getElementById('abtrieb-overlay').style.display='flex';};
window.saveAbtrieb=async function(){const datum=document.getElementById('ab-datum')?.value;await update(ref(db,'saison'),{abtriebtDatum:datum?new Date(datum).getTime():Date.now(),abtriebtNotiz:document.getElementById('ab-notiz')?.value.trim(),aktiv:false});const u={};Object.keys(kuehe).filter(id=>kuehe[id].almStatus==='oben').forEach(id=>{u[`kuehe/${id}/almStatus`]='unten';});if(Object.keys(u).length)await update(ref(db),u);closeForm('abtrieb-overlay');};

// ══════════════════════════════════════════════════════════════════════════════
//  MILCH
// ══════════════════════════════════════════════════════════════════════════════
function renderMilch() {
  const eintraege=Object.entries(milchEintraege).sort((a,b)=>b[1].datum-a[1].datum);
  const letzten14=eintraege.slice(0,14);
  const gesamtL14=letzten14.reduce((s,[,e])=>s+(e.gesamt||0),0);
  const proMonat={};
  eintraege.forEach(([,e])=>{if(!e.datum)return;const m=new Date(e.datum).toLocaleDateString('de-AT',{month:'short',year:'numeric'});proMonat[m]=(proMonat[m]||0)+(e.gesamt||0);});
  const kueheOben=Object.entries(kuehe).sort((a,b)=>{const nA=parseInt(a[1].nr)||0,nB=parseInt(b[1].nr)||0;return nA-nB;});
  return `
    <div class="page-header"><h2>🥛 Milchleistung</h2><button class="btn-primary" onclick="showMilchForm()">+ Eintrag</button></div>
    <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr">
      <div class="stat-card"><div class="stat-icon" style="font-size:.9rem">Ø/Tag</div><div class="stat-num" style="font-size:1.4rem">${letzten14.length?Math.round(gesamtL14/letzten14.length):'–'}L</div><div class="stat-label">14 Tage</div></div>
      <div class="stat-card"><div class="stat-icon" style="font-size:.9rem">Gesamt</div><div class="stat-num" style="font-size:1.4rem">${Math.round(gesamtL14)}L</div><div class="stat-label">14 Tage</div></div>
      <div class="stat-card" onclick="exportMilchMolkerei()"><div class="stat-icon">📤</div><div class="stat-num" style="font-size:.9rem">Export</div><div class="stat-label">→ Molkerei</div></div>
    </div>
    ${Object.keys(proMonat).length?`<div class="section-title">Monatsübersicht</div><div class="card-section" style="padding:.5rem .8rem">${Object.entries(proMonat).slice(0,6).map(([m,l])=>`<div class="info-row"><span>${m}</span><b>${Math.round(l)} L</b></div>`).join('')}</div>`:''}
    <div class="section-title">Einträge</div>
    <div class="card-list">
      ${eintraege.length ? eintraege.slice(0,30).map(([id,e])=>`
        <div class="list-card">
          <div class="list-card-left"><div>
            <div class="list-card-title">${new Date(e.datum).toLocaleDateString('de-AT',{weekday:'short',day:'numeric',month:'short'})}</div>
            <div class="list-card-sub">${e.art==='gesamt'?'Gesamtmenge':'Pro Kuh'} · ${e.zeit==='abend'?'🌇 Abends':'🌅 Morgens'}${e.molkerei?' · an Molkerei':''}</div>
          </div></div>
          <div class="list-card-right"><span style="font-size:1.1rem;color:var(--gold);font-weight:bold">${e.gesamt} L</span><button class="btn-xs-danger" onclick="deleteMilch('${id}')">✕</button></div>
        </div>`).join('') : `<div class="empty-state">Noch keine Einträge</div>`}
    </div>
    <div id="milch-form-overlay" class="form-overlay" style="display:none">
      <div class="form-sheet">
        <div class="form-header"><h3>Milch erfassen</h3><button class="close-btn" onclick="closeForm('milch-form-overlay')">✕</button></div>
        <div class="form-body">
          <input id="m-datum" class="inp" type="date" value="${isoDate(new Date())}" />
          <div style="display:flex;gap:.5rem;margin-bottom:.4rem">
            <button class="filter-chip active" id="m-zeit-morgen" onclick="selectMilchZeit('morgen',this)">🌅 Morgens</button>
            <button class="filter-chip" id="m-zeit-abend" onclick="selectMilchZeit('abend',this)">🌇 Abends</button>
          </div>
          <input type="hidden" id="m-zeit" value="morgen" />
          <label class="inp-label">Erfassungsart</label>
          <select id="m-art" class="inp" onchange="toggleMilchArt(this.value)">
            <option value="gesamt">Gesamtmenge (Alm)</option>
            <option value="prokuh">Pro Kuh</option>
          </select>
          <div id="m-gesamt-block"><input id="m-gesamt" class="inp" placeholder="Liter gesamt" inputmode="decimal" /></div>
          <div id="m-prokuh-block" style="display:none">
            ${kueheOben.map(([id,k])=>`<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem"><span class="nr-badge" style="min-width:44px">#${k.nr}</span><span style="flex:1;font-size:.83rem;color:var(--text2)">${k.name||''}</span><input class="inp kuh-liter" data-id="${id}" placeholder="L" inputmode="decimal" style="width:70px;text-align:right" /></div>`).join('')}
          </div>
          <label class="checkbox-row"><input type="checkbox" id="m-molkerei" /> An Molkerei abgegeben</label>
          <textarea id="m-notiz" class="inp" rows="2" placeholder="Notizen"></textarea>
          <div class="form-actions">
            <button class="btn-secondary" onclick="closeForm('milch-form-overlay')">Abbrechen</button>
            <button class="btn-primary" onclick="saveMilch()">Speichern</button>
          </div>
        </div>
      </div>
    </div>
  `;
}
window.selectMilchZeit=function(z,btn){
  document.getElementById('m-zeit').value=z;
  document.querySelectorAll('#m-zeit-morgen,#m-zeit-abend').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
};
window.showMilchForm=function(){const ov=document.getElementById('milch-form-overlay');if(!ov){navigate('milch');setTimeout(()=>showMilchForm(),150);return;}ov.style.display='flex';};
window.toggleMilchArt=function(v){document.getElementById('m-gesamt-block').style.display=v==='gesamt'?'':'none';document.getElementById('m-prokuh-block').style.display=v==='prokuh'?'':'none';};
window.saveMilch=async function(){
  const datum=document.getElementById('m-datum')?.value;const art=document.getElementById('m-art')?.value;
  let gesamt=0,prokuh={};
  if(art==='gesamt'){gesamt=parseFloat(document.getElementById('m-gesamt')?.value)||0;}

window.druckeBestandsbuch=function(){
  const alm=saisonInfo?.alm||'Alm';const jahr=saisonInfo?.jahr||new Date().getFullYear();
  const z=Object.values(behandlungen).filter(b=>b.medikament).sort((a,b)=>a.datum-b.datum).map(b=>{const k=kuehe[b.kuhId];return(function(){

        const tier='#'+(k?.nr||'?')+' '+(k?.name||'');
        const wzMEnde=b.wzMilchEnde?new Date(b.wzMilchEnde).toLocaleDateString('de-AT')+'('+zeit+')':'–';
        const wzFEnde=b.wzFleischEnde?new Date(b.wzFleischEnde).toLocaleDateString('de-AT')+'('+zeit+')':'–';
        const abgabe=b.abgabeDatum?new Date(b.abgabeDatum).toLocaleDateString('de-AT'):'–';
        return '<tr><td>'+dat+'</td><td>'+zeit+'</td><td>'+tier+'</td><td>'+(b.diagnose||'–')+'</td><td>'+(b.medikament||'–')+'</td><td>'+(b.dosis||'–')+'</td><td>'+abgabe+'</td><td>'+(b.wzMilchTage||'–')+'</td><td>'+wzMEnde+'</td><td>'+(b.wzFleischTage||'–')+'</td><td>'+wzFEnde+'</td><td>'+(b.tierarzt||'–')+'</td></tr>';

  w.document.close();
};

          <select id="f-gruppe" class="inp">

    <div id="tab-m" style="display:none">${mList.length?`<div class="card-list">${mList.map(([,m])=>`<div class="list-card list-card-sm"><span style="font-size:.8rem;color:var(--text3)">${new Date(m.datum).toLocaleDateString('de-AT')}</span><span style="color:var(--gold);font-weight:bold">${m.prokuh[id]} L</span></div>`).join('')}</div>`:`<div class="empty-state">Keine Einzelmilchdaten</div>`}</div>

function renderZaehlung() {
  const _zaehG=window._zaehGruppe||'';
  const kuhListe=Object.entries(kuehe)
    .filter(([,k])=>!_zaehG||k.gruppe===_zaehG)
    .sort((a,b)=>{const nA=parseInt(a[1].nr)||0,nB=parseInt(b[1].nr)||0;return nA-nB;});
  const anwesend=zaehlSession?.anwesend||{};
  const total=kuhListe.length;const anwCount=kuhListe.filter(([id])=>anwesend[id]).length;
  const voll=total>0&&anwCount===total;
  const zaehTab=window._zaehTab||'alle';
  return `
    <div class="page-header">
      <h2>✓ Herdenzählung</h2>
      <div style="display:flex;gap:.4rem;align-items:center">
        ${zaehlSession?`<button class="btn-ghost" onclick="resetZaehlung()" title="Reset">↺</button>`:''}
        <button class="btn-ghost" onclick="showChatPopup()" title="Hirten-Chat" style="font-size:1.3rem;padding:.1rem .4rem;position:relative">
          💬<span id="chat-badge-zaehlung" style="display:none;position:absolute;top:-2px;right:-2px;background:var(--red);color:#fff;border-radius:50%;width:14px;height:14px;font-size:.6rem;line-height:14px;text-align:center;font-family:sans-serif">1</span>
        </button>
      </div>
    </div>
    <!-- Gruppen Filter -->
    ${Object.keys(gruppen).length?`
    <div style="display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.7rem">
      <button class="filter-chip ${!window._zaehGruppe?'active':''}" onclick="setZaehGruppe('')">Alle</button>
      ${Object.values(gruppen).sort((a,b)=>a.name.localeCompare(b.name)).map(g=>`
        <button class="filter-chip ${window._zaehGruppe===g.name?'active':''}" onclick="setZaehGruppe('${g.name}')">
          <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${g.farbe||'#5ba85c'};margin-right:4px;vertical-align:middle"></span>${g.name}
        </button>`).join('')}
    </div>`:''}
    <div class="zaehlung-status ${voll?'z-voll':''}">
      <div class="z-counts"><span class="z-big">${anwCount}</span><span class="z-sep">/</span><span class="z-total">${total}</span></div>
      ${voll?`<div class="z-voll-msg">✓ Herde vollzählig!</div>`:`<div class="z-fehlt-msg">${total-anwCount} fehlen</div>`}
    </div>
    ${!zaehlSession?`<button class="btn-primary btn-block" onclick="startZaehlung()">Zählung starten</button>`:`
    <div class="zaehlung-eingabe">
      <input id="z-input" class="inp z-inp" placeholder="Nummer eingeben…" onkeydown="if(event.key==='Enter')zaehlKuh(this.value)" autocomplete="off" inputmode="numeric" autofocus />
      <button class="ok-btn" onclick="zaehlKuh(document.getElementById('z-input').value)">✓</button>
    </div>
    <!-- Tabs: Alle / Fehlend / Anwesend -->
    <div style="display:flex;gap:.4rem;margin-bottom:.7rem">
      <button class="filter-chip ${zaehTab==='alle'?'active':''}" onclick="setZaehTab('alle')">Alle (${total})</button>
      <button class="filter-chip ${zaehTab==='fehlend'?'active':''}" style="${zaehTab!=='alle'&&zaehTab!=='fehlend'?'':''}color:${total-anwCount>0?'var(--red)':'inherit'}" onclick="setZaehTab('fehlend')">Fehlen (${total-anwCount})</button>
      <button class="filter-chip ${zaehTab==='anwesend'?'active':''}" onclick="setZaehTab('anwesend')">✓ (${anwCount})</button>
    </div>

    <!-- Suchleiste -->
    <div class="search-bar" style="margin-bottom:.6rem">
      <input id="zaeh-search" class="search-inp" placeholder="Suche Nr, Name, Bauer…" oninput="filterZaehlung(this.value)" />
    </div>
    <!-- Vollständige Liste -->
    <div class="card-list" id="zaeh-list">
      ${kuhListe.map(([id,k])=>{
        const da=!!anwesend[id];
        if(zaehTab==='fehlend'&&da) return '';
        if(zaehTab==='anwesend'&&!da) return '';
        return `<div class="list-card list-card-sm zaeh-item" data-search="${(k.nr+' '+(k.name||'')+' '+(k.bauer||'')).toLowerCase()}" style="border-left:3px solid ${da?'var(--green)':'var(--border)'}">
          <span class="nr-badge">#${k.nr}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:.88rem;color:${da?'var(--text)':'var(--text2)'}">${k.name||'–'}</div>
            <div style="font-size:.7rem;color:var(--text3)">${k.bauer||''} ${k.gruppe?'· '+k.gruppe:''}</div>
          </div>
          ${da
            ? `<span style="color:var(--green);font-size:1rem">✓</span><button class="remove-btn" onclick="entferneZaehlung('${id}')">✕</button>`
            : `<button class="btn-xs" onclick="zaehlKuhById('${id}')">+ erfassen</button>`}
        </div>`;
      }).join('')}
    </div>`}
  `;
}
window.setZaehTab=function(t){window._zaehTab=t;render();};
window.setZaehGruppe=function(g){window._zaehGruppe=g;window._zaehTab='alle';render();};
window.filterZaehlung=function(q){
  document.querySelectorAll('.zaeh-item').forEach(c=>{
    c.style.display=c.dataset.search?.includes(q.toLowerCase())?'':'none';
  });
};

function renderBehandlung() {
  const aktive=Object.entries(behandlungen).filter(([,b])=>b.aktiv).sort((a,b)=>b[1].datum-a[1].datum);
  const archiv=Object.entries(behandlungen).filter(([,b])=>!b.aktiv).sort((a,b)=>b[1].datum-a[1].datum).slice(0,20);
  return `
    <div class="page-header"><h2>⚕ Behandlungen</h2><button class="btn-primary" onclick="showBehandlungForm(null)">+ Neu</button></div>
    ${aktive.length?`<div class="section-title">Aktiv (${aktive.length})</div>${aktive.map(([bid,b])=>behandlungCard(bid,b)).join('')}`:''}
    ${archiv.length?`<div class="section-title">Archiv</div>${archiv.map(([bid,b])=>behandlungCard(bid,b)).join('')}`:''}
    ${!aktive.length&&!archiv.length?'<div class="empty-state">Keine Behandlungen</div>':''}
    ${behandlungFormHTML(null)}

}

function renderBesamungModule() {
  const traechtig=Object.entries(besamungen).filter(([,b])=>b.status==='tragend').sort((a,b)=>a[1].erwartetGeburt-b[1].erwartetGeburt);
  const andere=Object.entries(besamungen).filter(([,b])=>b.status!=='tragend').sort((a,b)=>b[1].datum-a[1].datum).slice(0,20);
  return `
    <div class="page-header"><h2>🐮 Besamung & Kalbung</h2><button class="btn-primary" onclick="showBesamungForm(null)">+ Besamung</button></div>
    ${traechtig.length?`<div class="section-title">Trächtig (${traechtig.length})</div>${traechtig.map(([id,bs])=>besamungCard(id,bs)).join('')}`:''}
    ${andere.length?`<div class="section-title">Archiv</div>${andere.map(([id,bs])=>besamungCard(id,bs)).join('')}`:''}
    ${!traechtig.length&&!andere.length?'<div class="empty-state">Keine Besamungen</div>':''}
    ${besamungFormHTML(null)}${kalbungFormHTML()}
  `;
}

// ── Card-Helfer ────────────────────────────────────────────────────────────────
function behandlungCard(bid,b){
  const k=kuehe[b.kuhId];const h=Date.now();
  const wzMilchAb=b.wzMilchEnde&&b.wzMilchEnde<=h&&!b.warteAbgeschlossen;
  const wzFleischAb=b.wzFleischEnde&&b.wzFleischEnde<=h&&!b.warteAbgeschlossen;
  const wzAb=wzMilchAb||wzFleischAb;
  // Safe JSON for onclick
  const safeData=JSON.stringify(b).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return`<div class="history-card ${b.aktiv?'history-active':''}">
  <div class="history-top">
    <span class="history-date">${new Date(b.datum).toLocaleDateString('de-AT')}</span>
    ${b.aktiv?'<span class="tag tag-red">aktiv</span>':''}
    ${wzAb?'<span class="tag tag-red">⚠ WZ!</span>':''}
  </div>
  <div class="history-title">${b.diagnose||b.medikament||'Behandlung'} ${k?`<span style="color:var(--text3);font-size:.75rem">· #${k.nr} ${k.name||''}</span>`:''}</div>
  ${b.medikament?`<div class="history-sub">${b.medikament}${b.dosis?' · '+b.dosis:''}${b.tierarzt?' · Dr.'+b.tierarzt:''}</div>`:''}
  ${b.symptome?`<div class="history-note">${b.symptome}</div>`:''}
  ${b.abgabeDatum?`<div class="history-sub">💊 Abgabe: ${new Date(b.abgabeDatum).toLocaleDateString('de-AT')}</div>`:''}
  ${b.wzMilchEnde?`<div class="wartezeit-bar"><span>🥛 WZ Milch bis ${new Date(b.wzMilchEnde).toLocaleDateString('de-AT')}</span>${wzMilchAb?'<span class="tag tag-red">abgelaufen</span>':'<span class="tag tag-orange">läuft</span>'}</div>`:''}
  ${b.wzFleischEnde?`<div class="wartezeit-bar"><span>🥩 WZ Fleisch bis ${new Date(b.wzFleischEnde).toLocaleDateString('de-AT')}</span>${wzFleischAb?'<span class="tag tag-red">abgelaufen</span>':'<span class="tag tag-orange">läuft</span>'}</div>`:''}
  ${(!b.wzMilchEnde&&!b.wzFleischEnde&&b.wartezeitEnde)?`<div class="wartezeit-bar"><span>WZ bis ${new Date(b.wartezeitEnde).toLocaleDateString('de-AT')}</span>${b.wartezeitEnde<=h?'<span class="tag tag-green">✓</span>':'<span class="tag tag-orange">läuft</span>'}</div>`:''}
  ${b.folgeTermin?`<div class="history-note">📅 Folgetermin: ${new Date(b.folgeTermin).toLocaleDateString('de-AT')}</div>`:''}
  <div style="display:flex;gap:.4rem;margin-top:.5rem;flex-wrap:wrap">
    <button class="btn-xs" onclick="window.editBehandlung('${bid}')">✎ Bearbeiten</button>
    ${wzAb?`<button class="btn-xs" onclick="wartezeitAbschliessen('${bid}')">✓ WZ ok</button>`:''}
    <button class="btn-xs-danger" onclick="deleteBehandlung('${bid}')">löschen</button>
  </div>
</div>`;}

window.showKuhForm=function(id=null){

  if(id&&kuehe[id]){
    const k=kuehe[id];
    document.getElementById('f-nr').value=k.nr||'';
    document.getElementById('f-name').value=k.name||'';
    document.getElementById('f-rasse').value=k.rasse||'';
    document.getElementById('kuh-form-title').textContent='Kuh bearbeiten';
    // Set bauer
    const bauerSel=document.getElementById('f-bauer');
    const bauOpt=[...bauerSel.options].find(o=>o.value===k.bauer);

    else if(k.bauer){bauerSel.value='__neu__';document.getElementById('f-bauer-text').style.display='';document.getElementById('f-bauer-text').value=k.bauer;}
    // Set gruppe
    const grpSel=document.getElementById('f-gruppe');

    // Set notiz

  } else {

    document.getElementById('f-name').value='';
    document.getElementById('f-rasse').value='';
    document.getElementById('kuh-form-title').textContent='Kuh erfassen';

window.berechneTermine=function(){
  const d=document.getElementById('bs-datum')?.value;
  if(!d)return;
  const basis=new Date(d);
  // Geburtstermin: +9 Monate +10 Tage
  const geburt=new Date(basis);
  geburt.setMonth(geburt.getMonth()+9);
  geburt.setDate(geburt.getDate()+10);
  const geburtFeld=document.getElementById('bs-geburt');
  if(geburtFeld&&!geburtFeld.value)geburtFeld.value=isoDate(geburt);
  // Trockenstell: Geburt -8 Wochen
  const gv=document.getElementById('bs-geburt')?.value;
  if(gv){
    const trock=new Date(gv);
    trock.setDate(trock.getDate()-56);
    const trockFeld=document.getElementById('bs-trock');
    if(trockFeld&&!trockFeld.value)trockFeld.value=isoDate(trock);
  }
};

window.closeForm=function(id){const el=document.getElementById(id);if(el)el.style.display='none';};
window.switchTab=function(show,hide,btn){show.split(',').forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='';});hide.split(',').forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});btn.closest('.detail-tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');};

function statusLabel(s){return{besamt:'Besamt',tragend:'Trächtig',leer:'Leer',kalbung:'Gekälbert'}[s]||s;}
function isoDate(d){return d.toISOString().split('T')[0];}
function parseTable(text){if(!text)return null;const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());if(lines.length<2)return null;const sep=lines[0].includes('\t')?'\t':lines[0].includes(';')?';':',';const hdr=lines[0].split(sep).map(h=>h.trim().toLowerCase());const iN=hdr.findIndex(h=>/nr|num|ohr|marke|id/.test(h));const iK=hdr.findIndex(h=>/kuh|tier|name/.test(h));const iB=hdr.findIndex(h=>/bauer|landwirt|besitz|owner/.test(h));const iR=hdr.findIndex(h=>/rasse|breed/.test(h));const iG=hdr.findIndex(h=>/gruppe|group|abt/.test(h));if(iN<0)return null;return lines.slice(1).map(l=>{const c=l.split(sep).map(x=>x.trim());return{nr:c[iN]||'',name:iK>=0?c[iK]||'':'',bauer:iB>=0?c[iB]||'':'',rasse:iR>=0?(c[iR]||''):'',gruppe:iG>=0?(c[iG]||''):''};}).filter(r=>r.nr);}

function checkWartezeiten(){
  const h=Date.now();
  const f=Object.entries(behandlungen).filter(([,b])=>b.wartezeitEnde&&b.wartezeitEnde<=h&&!b.warteAbgeschlossen).map(([id,b])=>({id,medikament:b.medikament||'Medikament',kuhNr:kuehe[b.kuhId]?.nr||b.kuhId,kuhName:kuehe[b.kuhId]?.name||''}));
  // Besamungs-Erinnerungen (3 Wochen)
  const bErinnerung=Object.entries(besamungen).filter(([,b])=>b.erinnerungDatum&&b.erinnerungDatum<=h&&!b.erinnerungErledigt).map(([id,b])=>{const k=kuehe[b.kuhId];return{id,medikament:'Trächtigkeitsprüfung fällig',kuhNr:k?.nr||'',kuhName:k?.name||''};});
  const alle=[...f,...bErinnerung];
  if(alle.length&&'serviceWorker' in navigator)navigator.serviceWorker.ready.then(sw=>sw.active?.postMessage({type:'CHECK_WARTEZEITEN',faellig:alle}));
  // Browser Notification - SW bevorzugen (Android-kompatibel)
  if(bErinnerung.length && Notification.permission==='granted') {
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(sw => {
        bErinnerung.forEach(e => {
          sw.showNotification('🐄 Trächtigkeitsprüfung', {
            body: `${e.kuhName} #${e.kuhNr} – 3 Wochen seit Besamung`,
            icon: '/icon-192.png'
          });
        });
      });
    } else {
      bErinnerung.forEach(e=>{
        try{ new Notification('🐄 Trächtigkeitsprüfung',{body:`${e.kuhName} #${e.kuhNr}`}); }catch(_){}
      });
    }
  }
}

//  ALPUNGSTAGE / AMA-AUSWERTUNG
// ══════════════════════════════════════════════════════════════════════════════
function renderAlpung() {
  const heute = Date.now();
  const kuhListe = Object.entries(kuehe).sort((a,b)=>a[1].nr?.localeCompare(b[1].nr,undefined,{numeric:true}));
  
  // Alpungstage berechnen: von Auftrieb bis Abtrieb (oder heute falls noch oben)
  const auftriebTs = saisonInfo?.auftriebDatum || null;
  const abtriebtTs = saisonInfo?.abtriebtDatum || null;
  const saisonEnde = abtriebtTs || (saisonInfo?.aktiv ? heute : null);
  
  const rows = kuhListe.map(([id,k]) => {
    let tage = 0;
    if(auftriebTs && saisonEnde && k.almStatus !== undefined) {
      if(k.almStatus === 'oben' || abtriebtTs) {
        tage = Math.max(0, Math.floor((saisonEnde - auftriebTs) / 86400000));
      }
    }
    return {id, k, tage};
  });
  
  const gesamtTage = rows.reduce((s,r)=>s+r.tage,0);

  return `
    <div class="page-header"><h2>📊 Alpungstage / AMA</h2><button class="btn-primary" onclick="exportAlpung()">📤 Export</button></div>
    <div class="card-section" style="margin-bottom:.8rem">
      <div class="info-row"><span>Alm</span><b>${saisonInfo?.alm||'–'}</b></div>
      <div class="info-row"><span>Saison</span><b>${saisonInfo?.jahr||new Date().getFullYear()}</b></div>
      <div class="info-row"><span>Auftrieb</span><b>${auftriebTs?new Date(auftriebTs).toLocaleDateString('de-AT'):'–'}</b></div>
      <div class="info-row"><span>Abtrieb</span><b>${abtriebtTs?new Date(abtriebtTs).toLocaleDateString('de-AT'):saisonInfo?.aktiv?'noch oben':'–'}</b></div>
      <div class="info-row"><span>Gesamt Tiertage</span><b style="color:var(--gold)">${gesamtTage}</b></div>
    </div>
    <div class="section-title">Aufstellung pro Tier</div>
    <div style="overflow-x:auto">
      <table class="bb-table">
        <thead><tr><th>Nr</th><th>Name</th><th>Bauer</th><th>Alpungstage</th></tr></thead>
        <tbody>
          ${rows.map(({k,tage})=>`
            <tr>
              <td>#${k.nr}</td>
              <td>${k.name||'–'}</td>
              <td>${k.bauer||'–'}</td>
              <td><b style="color:var(--gold)">${tage}</b></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <p style="font-size:.72rem;color:var(--text3);margin-top:.8rem">
      Alpungstage = Auftriebsdatum bis Abtriebsdatum. Für AMA/ÖPUL-Antrag: Export als CSV verwenden.
    </p>
  `;
}
window.exportAlpung = function() {
  const heute = Date.now();
  const auftriebTs = saisonInfo?.auftriebDatum || null;
  const abtriebtTs = saisonInfo?.abtriebtDatum || null;
  const saisonEnde = abtriebtTs || (saisonInfo?.aktiv ? heute : null);
  const rows = Object.values(kuehe).sort((a,b)=>a.nr?.localeCompare(b.nr,undefined,{numeric:true})).map(k => {
    let tage = 0;
    if(auftriebTs && saisonEnde) tage = Math.max(0, Math.floor((saisonEnde - auftriebTs) / 86400000));
    return [k.nr, k.name||'', k.bauer||'', tage, saisonInfo?.alm||'', saisonInfo?.jahr||''];
  });
  const csv = 'Ohrmarke;Name;Bauer;Alpungstage;Alm;Jahr\n' + rows.map(r=>r.join(';')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = `Alpungstage_${saisonInfo?.jahr||new Date().getFullYear()}.csv`;
  a.click();
};

//  TÄGLICHE KONTROLLE
// ══════════════════════════════════════════════════════════════════════════════
function renderKontrolle() {
  const heute = isoDate(new Date());
  // Heutige Kontrolle aus zaehlung
  const anwesend = zaehlSession?.anwesend || {};
  const gruppenListe = Object.entries(gruppen).sort((a,b)=>a[1].name?.localeCompare(b[1].name));
  
  // Aktive Gruppe filtern
  const aktiveGruppe = window._kontrolleGruppe || '';
  const kuhListe = Object.entries(kuehe)
    .filter(([,k]) => k.almStatus === 'oben' && (!aktiveGruppe || k.gruppe === aktiveGruppe))
    .sort((a,b) => {
      const nA = parseInt(a[1].nr)||0, nB = parseInt(b[1].nr)||0;
      return nA - nB;
    });
  
  const anwCount = kuhListe.filter(([id]) => anwesend[id]).length;
  const total = kuhListe.length;
  const voll = total > 0 && anwCount === total;
  const fehlend = kuhListe.filter(([id]) => !anwesend[id]);

  return `
    <div class="page-header">
      <h2>🔍 Tägliche Kontrolle</h2>
      ${zaehlSession?`<button class="btn-ghost" onclick="resetZaehlung()">↺ Reset</button>`:''}
    </div>

    <!-- Gruppen-Filter -->
    ${gruppenListe.length ? `
    <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem">
      <button class="filter-chip ${!aktiveGruppe?'active':''}" onclick="filterKontrolleGruppe('')">Alle</button>
      ${gruppenListe.map(([,g])=>`
        <button class="filter-chip ${aktiveGruppe===g.name?'active':''}" onclick="filterKontrolleGruppe('${g.name}')">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${g.farbe||'#5ba85c'};margin-right:4px"></span>${g.name}
        </button>`).join('')}
    </div>` : ''}

    <!-- Status -->
    <div class="zaehlung-status ${voll?'z-voll':''}">
      <div class="z-counts">
        <span class="z-big">${anwCount}</span>
        <span class="z-sep">/</span>
        <span class="z-total">${total}</span>
      </div>

window.uploadFoto = function(kuhId, input) {
  const file = input.files[0];
  if(!file) return;
  if(file.size > 500000) { alert('Foto zu groß – bitte unter 500KB (Foto in Kamera-App verkleinern)'); return; }
  const reader = new FileReader();
  reader.onload = async function(e) {
    await set(ref(db,'fotos/'+kuhId), { data: e.target.result, updatedAt: Date.now() });
  };
  reader.readAsDataURL(file);
};
window.deleteFoto = async function(kuhId) {
  if(confirm('Foto löschen?')) await remove(ref(db,'fotos/'+kuhId));
};

//  KALENDER
// ══════════════════════════════════════════════════════════════
function renderKalender() {
  const heute = Date.now();
  const in60 = heute + 60*86400000;
  
  // Alle Termine sammeln
  const termine = [];
  
  // Wartezeiten
  Object.entries(behandlungen).forEach(([id,b]) => {
    if(b.wartezeitEnde && !b.warteAbgeschlossen) {
      const k=kuehe[b.kuhId];
      termine.push({ ts:b.wartezeitEnde, typ:'wartezeit', label:`Wartezeit: ${b.medikament||''}`, kuh:`#${k?.nr||''} ${k?.name||''}`, farbe:'var(--orange)', icon:'⚕' });
    }
    if(b.folgeTermin && !b.folgeErledigt) {
      const k=kuehe[b.kuhId];
      termine.push({ ts:b.folgeTermin, typ:'folge', label:`Folgebehandlung: ${b.diagnose||''}`, kuh:`#${k?.nr||''} ${k?.name||''}`, farbe:'var(--red)', icon:'⚕' });
    }
  });
  
  // Geburten
  Object.entries(besamungen).forEach(([id,b]) => {
    const k=kuehe[b.kuhId];
    if(b.erwartetGeburt && b.status==='tragend') {
      termine.push({ ts:b.erwartetGeburt, typ:'geburt', label:'Geburt erwartet', kuh:`#${k?.nr||''} ${k?.name||''}`, farbe:'var(--green)', icon:'🐄' });
    }
    if(b.trockenstell && b.status==='tragend') {
      termine.push({ ts:b.trockenstell, typ:'trocken', label:'Trockenstellung', kuh:`#${k?.nr||''} ${k?.name||''}`, farbe:'var(--blue)', icon:'💧' });
    }
    if(b.erinnerungDatum && !b.erinnerungErledigt) {
      termine.push({ ts:b.erinnerungDatum, typ:'erinnerung', label:'Trächtigkeitsprüfung', kuh:`#${k?.nr||''} ${k?.name||''}`, farbe:'var(--gold)', icon:'🔔' });
    }
  });
  
  // Weide heute
  const heuteDatum=isoDate(new Date());
  Object.values(weideTage).forEach(w => {
    if(w.datum===heuteDatum) {
      termine.push({ ts:Date.now(), typ:'weide', label:`Weide: ${weiden[w.weideId]?.name||w.weideText||''}`, kuh:`${w.kuhIds?.length||0} Tiere`, farbe:'var(--green)', icon:'🌿' });
    }
  });
  
  // Sortieren
  termine.sort((a,b)=>a.ts-b.ts);
  const vergangen = termine.filter(t=>t.ts<heute);
  const bald = termine.filter(t=>t.ts>=heute && t.ts<=in60);
  const spaeter = termine.filter(t=>t.ts>in60);
  
  const renderTermin = t => `
    <div class="list-card" style="border-left:3px solid ${t.farbe}">
      <div class="list-card-left">
        <span style="font-size:1.2rem">${t.icon}</span>
        <div>
          <div class="list-card-title">${t.label}</div>
          <div class="list-card-sub">${t.kuh} · ${new Date(t.ts).toLocaleDateString('de-AT',{weekday:'short',day:'numeric',month:'short'})}</div>
        </div>
      </div>
      <span style="font-size:.75rem;color:${t.ts<heute?'var(--red)':'var(--text3)'}">
        ${t.ts<heute?`vor ${Math.floor((heute-t.ts)/86400000)}d`:`in ${Math.ceil((t.ts-heute)/86400000)}d`}
      </span>
    </div>`;

  return `
    <div class="page-header"><h2>📅 Kalender</h2></div>
    ${vergangen.length?`<div class="section-title" style="color:var(--red)">Überfällig (${vergangen.length})</div><div class="card-list">${vergangen.slice(0,10).map(renderTermin).join('')}</div>`:''}
    <div class="section-title">Nächste 60 Tage (${bald.length})</div>
    ${bald.length?`<div class="card-list">${bald.map(renderTermin).join('')}</div>`:`<div class="empty-state">Keine Termine</div>`}
    ${spaeter.length?`<div class="section-title">Später</div><div class="card-list">${spaeter.slice(0,10).map(renderTermin).join('')}</div>`:''}
  `;
}

// ══════════════════════════════════════════════════════════════
//  WEIDEGANG STATISTIK
// ══════════════════════════════════════════════════════════════
function renderStatistik() {
  // Trigger animations after render
  setTimeout(() => {
    document.querySelectorAll('.stat-bar-fill').forEach(bar => {
      bar.style.transition = 'width 1.2s cubic-bezier(.16,1,.3,1)';
      bar.style.width = bar.dataset.target;
    });
    document.querySelectorAll('.stat-count-up').forEach(el => {
      const target = parseInt(el.dataset.target)||0;
      let current = 0;
      const step = Math.ceil(target/40);
      const timer = setInterval(()=>{
        current = Math.min(current+step, target);
        el.textContent = Math.round(current);
        if(current>=target) clearInterval(timer);
      }, 30);
    });
  }, 100);

  const wTageListe = Object.values(weideTage).sort((a,b)=>a.datum?.localeCompare(b.datum));
  const weidenListe = Object.entries(weiden);
  
  // Tage pro Weide
  const proWeide = {};
  weidenListe.forEach(([id,w])=>{ proWeide[id]={name:w.name, farbe:w.farbe||'#5ba85c', tage:0, tiere:0}; });
  wTageListe.forEach(w=>{
    if(!proWeide[w.weideId]) proWeide[w.weideId]={name:w.weideText||'Unbekannt',farbe:'#888',tage:0,tiere:0};
    proWeide[w.weideId].tage++;
    proWeide[w.weideId].tiere += (w.kuhIds?.length||0);
  });
  
  // Tage pro Kuh
  const proKuh = {};
  wTageListe.forEach(w=>{
    (w.kuhIds||[]).forEach(id=>{
      if(!proKuh[id]) proKuh[id]=0;
      proKuh[id]++;
    });
  });
  
  // Milchstatistik
  const milchListe = Object.values(milchEintraege).sort((a,b)=>a.datum-b.datum);
  const milchGesamt = milchListe.reduce((s,m)=>s+(m.gesamt||0),0);
  const milchMorgen = milchListe.filter(m=>m.zeit==='morgen').reduce((s,m)=>s+(m.gesamt||0),0);
  const milchAbend = milchListe.filter(m=>m.zeit==='abend').reduce((s,m)=>s+(m.gesamt||0),0);
  const milchMolkerei = milchListe.filter(m=>m.molkerei).reduce((s,m)=>s+(m.gesamt||0),0);
  
  const maxTage = Math.max(...Object.values(proWeide).map(w=>w.tage), 1);
  
  return `
    <div class="page-header"><h2>📊 Statistik</h2></div>
    
    <div class="section-title">Milch Saison</div>
    <div class="stats-grid" style="grid-template-columns:1fr 1fr">
      <div class="stat-card"><div class="stat-icon">🥛</div><div class="stat-num"><span class="stat-count-up" data-target="${Math.round(milchGesamt)}">0</span>L</div><div class="stat-label">Gesamt</div></div>
      <div class="stat-card"><div class="stat-icon">🏭</div><div class="stat-num">${Math.round(milchMolkerei)}L</div><div class="stat-label">an Molkerei</div></div>
      <div class="stat-card"><div class="stat-icon">🌅</div><div class="stat-num">${Math.round(milchMorgen)}L</div><div class="stat-label">Morgens</div></div>
      <div class="stat-card"><div class="stat-icon">🌇</div><div class="stat-num">${Math.round(milchAbend)}L</div><div class="stat-label">Abends</div></div>
    </div>
    
    <div class="section-title">Weidegang nach Weide</div>
    ${Object.values(proWeide).length ? `
    <div class="card-section">
      ${Object.values(proWeide).sort((a,b)=>b.tage-a.tage).map(w=>`
        <div style="margin-bottom:.6rem">
          <div style="display:flex;justify-content:space-between;font-size:.83rem;margin-bottom:3px">
            <span style="color:var(--text2)">${w.name}</span>
            <span style="color:var(--gold)">${w.tage} Tage · Ø ${w.tage?Math.round(w.tiere/w.tage):0} Tiere</span>
          </div>
          <div style="background:var(--bg);border-radius:4px;height:10px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.3)">
            <div class="stat-bar-fill" data-target="${Math.round(w.tage/maxTage*100)}%" style="background:linear-gradient(90deg,var(--green),var(--green2));height:100%;width:0%;border-radius:4px;box-shadow:0 0 8px rgba(77,184,78,.4)"></div>
          </div>
        </div>`).join('')}
    </div>` : `<div class="empty-state">Noch keine Weidedaten</div>`}
    
    <div class="section-title">Weidegang top Kühe</div>
    <div class="card-list">
      ${Object.entries(proKuh).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([id,tage])=>{
        const k=kuehe[id];
        return `<div class="list-card list-card-sm">
          <span class="nr-badge">#${k?.nr||id}</span>
          <span class="list-card-title">${k?.name||''}</span>
          <span style="color:var(--gold);font-weight:bold">${tage} Tage</span>
        </div>`;
      }).join('')||'<div class="empty-state">Noch keine Daten</div>'}
    </div>
  `;
}

  <p>Erstellt: ${new Date().toLocaleDateString('de-AT')} · ${kuhListe.length} Tiere total</p>

function renderSuche() {
  const q = window._sucheQ||'';
  let ergebnisse = [];
  if(q.length>=2) {
    const ql = q.toLowerCase();
    // Kühe
    Object.entries(kuehe).forEach(([id,k])=>{
      if((k.nr+' '+(k.name||'')+' '+(k.bauer||'')).toLowerCase().includes(ql)) {
        ergebnisse.push({typ:'kuh',id,titel:`#${k.nr} ${k.name||'–'}`,sub:`${k.bauer||''} ${k.rasse||''} ${k.gruppe||''}`,aktion:`showKuhDetail('${id}')`});
      }
    });
    // Behandlungen
    Object.entries(behandlungen).forEach(([id,b])=>{
      const k=kuehe[b.kuhId];
      if(((b.diagnose||'')+(b.medikament||'')+(k?.name||'')).toLowerCase().includes(ql)) {
        ergebnisse.push({typ:'behandlung',id,titel:b.diagnose||b.medikament||'Behandlung',sub:`#${k?.nr||''} ${k?.name||''} · ${new Date(b.datum).toLocaleDateString('de-AT')}`,aktion:`navigate('behandlung')`});
      }
    });
    // Besamungen
    Object.entries(besamungen).forEach(([id,b])=>{
      const k=kuehe[b.kuhId];
      if(((b.stier||'')+(b.samen||'')+(k?.name||'')).toLowerCase().includes(ql)) {
        ergebnisse.push({typ:'besamung',id,titel:`Besamung: ${b.stier||b.samen||''}`,sub:`#${k?.nr||''} ${k?.name||''} · ${new Date(b.datum).toLocaleDateString('de-AT')}`,aktion:`navigate('besamung')`});
      }
    });
  }
  const icons={kuh:'🐄',behandlung:'⚕',besamung:'🐮',bauer:'👤'};
  return `
    <div class="page-header"><h2>🔎 Suche</h2></div>
    <div class="search-bar">
      <input id="global-search" class="search-inp" placeholder="Kuh, Bauer, Diagnose, Stier…"
        value="${q}" oninput="globalSuche(this.value)" autofocus
        dir="ltr" lang="de" style="text-align:left;direction:ltr;unicode-bidi:plaintext" />
    </div>
    ${q.length<2?`<div class="empty-state">Mindestens 2 Zeichen eingeben</div>`
    :ergebnisse.length?`
    <div class="section-title">${ergebnisse.length} Ergebnisse</div>
    <div class="card-list">
      ${ergebnisse.map(e=>`
        <div class="list-card" onclick="${e.typ==='kuh'?`showKuhPopup('${e.id}')`:e.typ==='bauer'?`showBauerPopup('${e.id}')`:e.aktion}">
          <div class="list-card-left">
            <span style="font-size:1.2rem">${icons[e.typ]||'•'}</span>
            <div>
              <div class="list-card-title">${e.titel}</div>
              <div class="list-card-sub">${e.sub}</div>
            </div>
          </div>
          <span class="chevron">›</span>
        </div>`).join('')}
    </div>`:`<div class="empty-state">Keine Ergebnisse für „${q}"</div>`}
  `;
}
window.globalSuche=function(q){
  window._sucheQ=q;
  const pos=document.getElementById('global-search')?.selectionStart;
  render();
  const inp=document.getElementById('global-search');
  if(inp){inp.focus();try{inp.setSelectionRange(pos,pos);}catch(e){}}
};

window.clearCache = function() {
  if('caches' in window) {
    caches.keys().then(names=>Promise.all(names.map(n=>caches.delete(n)))).then(()=>{
      location.reload(true);
    });
  } else {
    location.reload(true);
  }
};

window.testBenachrichtigung = async function() {
  if(!('Notification' in window)) { alert('Dein Browser unterstützt keine Benachrichtigungen'); return; }
  
  if(Notification.permission === 'denied') {
    alert('Benachrichtigungen wurden blockiert.\nBitte in den Browser-Einstellungen erlauben:\nEinstellungen → Website-Einstellungen → Benachrichtigungen → HerdenPro erlauben');
    return;
  }
  
  if(Notification.permission !== 'granted') {
    const perm = await Notification.requestPermission();
    if(perm !== 'granted') { alert('Berechtigung verweigert'); return; }
  }
  
  // Auf Handy: ServiceWorker verwenden (Android-Pflicht)
  // Am PC: direkte Notification
  try {
    if('serviceWorker' in navigator) {
      const sw = await navigator.serviceWorker.ready;
      await sw.showNotification('🐄 HerdenPro – Test', {
        body: 'Benachrichtigungen funktionieren! Wartezeiten und Erinnerungen werden automatisch gemeldet.',
        icon: '/icon-192.png',
        badge: '/icon-192.png',
        vibrate: [200, 100, 200]
      });
      alert('✓ Benachrichtigung gesendet!');
    } else {
      new Notification('🐄 HerdenPro – Test', {
        body: 'Benachrichtigungen funktionieren!'
      });
    }
  } catch(e) {
    // Fallback
    try {
      new Notification('🐄 HerdenPro – Test', { body: 'Benachrichtigungen funktionieren!' });
    } catch(e2) {
      alert('Fehler: ' + e2.message + '\nBitte App als PWA installieren (Zum Homescreen hinzufügen).');
    }
  }
};

window.benachrichtigungErlauben = async function() {
  if(!('Notification' in window)) { 
    alert('Dein Browser unterstützt keine Benachrichtigungen.\nTipp: App als PWA installieren (Homescreen hinzufügen) und Chrome verwenden.');
    return; 
  }
  const perm = await Notification.requestPermission();
  if(perm === 'granted') {
    render();
    // Sofort Test senden
    setTimeout(() => testBenachrichtigung(), 500);
  } else if(perm === 'denied') {
    alert('Blockiert. So freischalten:\nAndroid Chrome: Einstellungen → Website-Einstellungen → Benachrichtigungen → stately-cat-fcf296.netlify.app → Erlauben\niPhone Safari: Einstellungen → Safari → Websites → Benachrichtigungen');
  }
};

//  SENNEREI EXCEL EXPORT
// ══════════════════════════════════════════════════════════════
window.exportMolkereiExcel = function() {
  // Wir brauchen SheetJS (XLSX library)
  if(typeof XLSX === 'undefined') {
    alert('Bibliothek wird geladen, bitte nochmal tippen...');
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>exportMolkereiExcel();
    document.head.appendChild(s);
    return;
  }

  const wb = XLSX.utils.book_new();
  
  // ── Milchdaten nach Wochen aufteilen ──
  // Saison-Start ermitteln
  const saisonStart = saisonInfo?.auftriebDatum ? new Date(saisonInfo.auftriebDatum) : new Date(new Date().getFullYear(),4,1); // Mai
  
  // Alle Milcheinträge nach Woche gruppieren (W1-W14)
  const wochenMilch = {}; // { kuhId: { W1: liter, W2: liter, ... } }
  
  Object.values(milchEintraege).forEach(m => {
    if(!m.datum) return;
    const datum = new Date(m.datum);
    const tageSeit = Math.floor((datum - saisonStart) / 86400000);
    const woche = Math.min(14, Math.max(1, Math.floor(tageSeit/7) + 1));
    const wKey = 'W'+woche;
    
    if(m.art === 'prokuh' && m.prokuh) {
      Object.entries(m.prokuh).forEach(([kuhId, liter]) => {
        if(!wochenMilch[kuhId]) wochenMilch[kuhId] = {};
        wochenMilch[kuhId][wKey] = (wochenMilch[kuhId][wKey]||0) + liter;
      });
    } else if(m.art === 'gesamt') {
      // Gesamtmenge gleichmäßig auf alle aufgetriebenen Kühe verteilen
      const obenKuehe = Object.keys(kuehe).filter(id=>kuehe[id].almStatus==='oben');
      if(obenKuehe.length) {
        const proKuh = (m.gesamt||0) / obenKuehe.length;
        obenKuehe.forEach(kuhId => {
          if(!wochenMilch[kuhId]) wochenMilch[kuhId] = {};
          wochenMilch[kuhId][wKey] = (wochenMilch[kuhId][wKey]||0) + proKuh;
        });
      }
    }
  });

  // ── Daten nach Bauer gruppieren ──
  const bauernMap = {}; // { bauerName: [{kuhId, k}] }
  Object.entries(kuehe).sort((a,b)=>parseInt(a[1].nr)-parseInt(b[1].nr)).forEach(([id,k])=>{
    const b = k.bauer||'Unbekannt';
    if(!bauernMap[b]) bauernMap[b]=[];
    bauernMap[b].push({id,k});
  });

  const WOCHEN = ['W1','W2','W3','W4','W5','W6','W7','W8','W9','W10','W11','W12','W13','W14'];
  
  // ── Sheet aufbauen ──
  const rows = [];
  
  // Titel
  rows.push(['Stallbuch - Milcherfassung | Import aus HerdenPro','','','','','','','','','','','','','','','','','']);
  rows.push([`Saison ${saisonInfo?.jahr||new Date().getFullYear()} | Alm: ${saisonInfo?.alm||'–'} | Export: ${new Date().toLocaleDateString('de-AT')}`,'','','','','','','','','','','','','','','','','']);
  rows.push(['','Kuh-Nr.','Name','Summen',...WOCHEN]);

  // Gesamt-Summenzeile (wird am Ende berechnet)
  const gesamtRow = ['Gesamt','','','0',...WOCHEN.map(()=>0)];
  rows.push(gesamtRow);

  let gesamtSummen = new Array(14).fill(0);

  Object.entries(bauernMap).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([bauerName, kueheList]) => {
    // Bauer-Zeile
    const bauerBio = kueheList.some(({id})=>kuehe[id]?.bio) ? '  [Bio]' : '';
    rows.push([bauerName+bauerBio,'','','','','','','','','','','','','','','','','']);
    
    // Kühe
    kueheList.forEach(({id,k})=>{
      const wData = wochenMilch[id]||{};
      const werte = WOCHEN.map(w=>Math.round((wData[w]||0)*10)/10);
      const summe = werte.reduce((s,v)=>s+v,0);
      werte.forEach((v,i)=>gesamtSummen[i]+=v);
      rows.push(['',k.nr,k.name||'',Math.round(summe*10)/10,...werte]);
    });
  });

  // Gesamt aktualisieren
  const gesamtIdx = 3;
  rows[gesamtIdx][3] = Math.round(gesamtSummen.reduce((s,v)=>s+v,0)*10)/10;
  gesamtSummen.forEach((v,i)=>rows[gesamtIdx][4+i]=Math.round(v*10)/10);

  const ws = XLSX.utils.aoa_to_sheet(rows);
  
  // Spaltenbreiten
  ws['!cols'] = [
    {wch:24},{wch:10},{wch:14},{wch:10},
    ...WOCHEN.map(()=>({wch:7}))
  ];

  // Merge Titel
  ws['!merges'] = [
    {s:{r:0,c:0},e:{r:0,c:17}},
    {s:{r:1,c:0},e:{r:1,c:17}},
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'Stall');
  
  // ── Anleitung Sheet ──
  const wsAnl = XLSX.utils.aoa_to_sheet([
    ['HerdenPro → Molkerei Import'],
    [''],
    ['So importieren:'],
    ['1. Diese Datei öffnen'],
    ['2. Sheet "Stall" kopieren ins Molkerei-System (Stall-Sheet ersetzen)'],
    ['3. Wochensummen werden automatisch übernommen'],
    [''],
    ['Hinweis: Milchmengen in Liter. Molkerei-System rechnet ebenfalls in Liter.'],
    ['Umrechnung L→kg falls nötig: 1L ≈ 1,033 kg'],
  ]);
  XLSX.utils.book_append_sheet(wb, wsAnl, 'Anleitung');

  // Download
  const jahr = saisonInfo?.jahr||new Date().getFullYear();
  const alm = (saisonInfo?.alm||'Alm').replace(/[^a-zA-Z0-9]/g,'_');
  XLSX.writeFile(wb, `Molkerei_Import_${alm}_${jahr}.xlsx`);
};

function renderChat() {
  // Update badge
  updateChatBadge();
  if(currentView==='chat') {
    render();
    setTimeout(()=>{
      const el=document.getElementById('chat-messages');
      if(el) el.scrollTop=el.scrollHeight;
    },50);
  } else {
    // Popup aktualisieren falls offen
    const popup = document.getElementById('chat-popup');
    if(popup && popup.style.display!=='none') renderChatPopupContent();
  }
}

let _lastSeenChat = parseInt(localStorage.getItem('lastSeenChat')||'0');
let _chatUnread = 0;

function updateChatBadge() {
  const nachrichten = Object.values(chatNachrichten);
  _chatUnread = nachrichten.filter(m=>m.ts>_lastSeenChat && m.name!==_chatName).length;
  // Nav badge
  const navBtns = document.querySelectorAll('.nav-item');
  navBtns.forEach(btn=>{
    const existing = btn.querySelector('.chat-badge');
    if(existing) existing.remove();
    if(btn.textContent.includes('Chat') && _chatUnread>0) {
      const badge = document.createElement('span');
      badge.className='chat-badge';
      badge.style.cssText='position:absolute;top:4px;right:calc(50% - 18px);background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:.62rem;line-height:16px;text-align:center;font-family:sans-serif;z-index:2';
      badge.textContent = _chatUnread > 9 ? '9+' : _chatUnread;
      btn.style.position='relative';
      btn.appendChild(badge);
    }
  });
  // Zählung badge
  const zBadge = document.getElementById('chat-badge-zaehlung');
  if(zBadge) zBadge.style.display = _chatUnread>0?'':'none';
  // Mehr-btn badge
  document.querySelectorAll('.mehr-btn').forEach(btn=>{
    if(btn.textContent.includes('Chat')) {
      let b = btn.querySelector('.chat-badge');
      if(!b && _chatUnread>0) {
        b=document.createElement('span');
        b.className='chat-badge';
        b.style.cssText='position:absolute;top:4px;right:4px;background:var(--red);color:#fff;border-radius:50%;width:14px;height:14px;font-size:.58rem;line-height:14px;text-align:center;font-family:sans-serif';
        btn.style.position='relative';
        btn.appendChild(b);
      }
      if(b) b.textContent=_chatUnread>0?(_chatUnread>9?'9+':_chatUnread):'';
      if(b) b.style.display=_chatUnread>0?'':'none';
    }
  });
}

function markChatRead() {
  _lastSeenChat = Date.now();
  localStorage.setItem('lastSeenChat', _lastSeenChat);
  _chatUnread = 0;
  updateChatBadge();
}

// Push notification für neue Chat-Nachricht
let _prevChatCount = 0;
function checkNewChatMsg() {
  const msgs = Object.values(chatNachrichten);
  const newMsgs = msgs.filter(m=>m.ts>_lastSeenChat&&m.name!==_chatName);
  if(newMsgs.length > _chatUnread && Notification.permission==='granted' && currentView!=='chat') {
    const last = newMsgs[newMsgs.length-1];
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(sw=>sw.showNotification('💬 '+last.name,{body:last.text||'📷 Foto',tag:'chat-'+last.ts}));
    }
  }
}

// ── Chat Popup (für Zählung) ──
window.showChatPopup = function() {
  markChatRead();
  let popup = document.getElementById('chat-popup');
  if(!popup) {
    popup = document.createElement('div');
    popup.id = 'chat-popup';
    popup.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)';
    popup.onclick = e => { if(e.target===popup) closeChatPopup(); };
    document.body.appendChild(popup);
  }
  popup.style.display='flex';
  renderChatPopupContent();
};

function renderChatPopupContent() {
  const popup = document.getElementById('chat-popup');
  if(!popup || popup.style.display==='none') return;
  const nachrichten = Object.entries(chatNachrichten).sort((a,b)=>a[1].ts-b[1].ts).slice(-30);
  popup.innerHTML = `
    <div style="background:linear-gradient(180deg,var(--bg2),var(--bg));border:1px solid var(--border2);border-radius:24px 24px 0 0;width:100%;max-width:540px;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(0,0,0,.5)">

      </div>
      <div id="chat-popup-msgs" style="flex:1;overflow-y:auto;padding:.7rem 1rem;display:flex;flex-direction:column;gap:.35rem">
        ${nachrichten.length ? nachrichten.map(([id,m])=>`
          <div style="display:flex;flex-direction:column;align-items:${m.name===_chatName?'flex-end':'flex-start'}">
            <div style="font-size:.62rem;color:var(--text3);margin-bottom:2px;padding:0 .3rem">${m.name===_chatName?'Du':m.name} · ${new Date(m.ts).toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'})}</div>
            <div style="max-width:80%;background:${m.name===_chatName?'rgba(212,168,75,.2)':'var(--bg3)'};border:1px solid ${m.name===_chatName?'var(--gold2)':'var(--border2)'};border-radius:12px;padding:.45rem .75rem">
              ${m.foto?`<img src="${m.foto}" style="max-width:180px;max-height:130px;border-radius:8px;display:block" />`:''}
              ${m.text?`<div style="font-size:.85rem;color:var(--text)">${m.text}</div>`:''}
              ${m.kuhNr?`<span class="nr-badge">#${m.kuhNr}</span>`:''}
            </div>
          </div>`).join('') : '<div class="empty-state" style="padding:1rem">Noch keine Nachrichten</div>'}
      </div>
      <div style="padding:.6rem 1rem;border-top:1px solid var(--border);display:flex;gap:.4rem">
        <input id="chat-popup-inp" class="inp" placeholder="Nachricht…" style="flex:1;font-size:.88rem" dir="ltr"
          onkeydown="if(event.key==='Enter')sendChatPopupMsg()" />
        <button class="ok-btn" onclick="sendChatPopupMsg()" style="padding:0 .8rem;font-size:1.1rem">➤</button>
      </div>
    </div>`;
  setTimeout(()=>{
    const el=document.getElementById('chat-popup-msgs');
    if(el) el.scrollTop=el.scrollHeight;
    document.getElementById('chat-popup-inp')?.focus();
  },50);
}

window.closeChatPopup = function() {
  const p=document.getElementById('chat-popup');
  if(p) p.style.display='none';
};

window.sendChatPopupMsg = async function() {
  if(!_chatName) { showChatPopup(); return; }
  const inp=document.getElementById('chat-popup-inp');
  const text=inp?.value.trim();
  if(!text) return;
  await push(ref(db,'chat'),{name:_chatName,text,ts:Date.now()});
  inp.value='';
};

window.setChatName = function() {
  const name=document.getElementById('chat-name-inp')?.value.trim();
  if(!name){alert('Bitte Namen eingeben');return;}
  _chatName=name;
  localStorage.setItem('chatName',name);
  render();
};

window.sendChatMsg = async function() {
  const text=document.getElementById('chat-inp')?.value.trim();
  if(!text||!_chatName) return;
  await push(ref(db,'chat'),{name:_chatName,text,ts:Date.now()});
  document.getElementById('chat-inp').value='';
};

window.sendKuhMsg = async function() {
  const nr=document.getElementById('chat-kuh-inp')?.value.trim();
  if(!nr||!_chatName) return;
  const k=Object.values(kuehe).find(k=>k.nr===nr);
  const text=k?`Kuh ${k.name||''} #${nr} gefunden ✓`:`#${nr} gefunden ✓`;
  await push(ref(db,'chat'),{name:_chatName,text,kuhNr:nr,ts:Date.now()});
  document.getElementById('chat-kuh-inp').value='';
};

window.sendFotoMsg = async function(input) {
  if(!input.files[0]||!_chatName) return;
  const file=input.files[0];
  if(file.size>800000){alert('Foto zu groß – bitte unter 800KB');return;}
  const reader=new FileReader();
  reader.onload=async function(e){
    await push(ref(db,'chat'),{name:_chatName,foto:e.target.result,ts:Date.now()});
  };
  reader.readAsDataURL(file);
};

window.clearChat = async function() {
  await remove(ref(db,'chat'));
};


// Ripple effect on buttons
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.btn-primary,.btn-secondary,.list-card,.stat-card');
  if(!btn || btn.classList.contains('no-ripple')) return;
  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const ripple = document.createElement('span');
  ripple.style.cssText = `position:absolute;border-radius:50%;background:rgba(255,255,255,.15);transform:scale(0);animation:ripple .4s ease;left:${x-15}px;top:${y-15}px;width:30px;height:30px;pointer-events:none;z-index:0`;
  btn.style.position = btn.style.position || 'relative';
  btn.style.overflow = 'hidden';
  btn.appendChild(ripple);
  setTimeout(()=>ripple.remove(), 420);
});

function renderKraftfutter() {
  const heute = Date.now();
  const saisonStart = saisonInfo?.auftriebDatum || null;
  
  // Berechne Tage mit extra Kraftfutter pro Kuh
  const kfProKuh = {};
  Object.values(kraftfutter).forEach(kf => {
    if(!kfProKuh[kf.kuhId]) kfProKuh[kf.kuhId] = [];
    kfProKuh[kf.kuhId].push(kf);
  });
  
  // Kühe mit Kraftfutter sortiert nach Nummer
  const kueheList = Object.entries(kuehe).sort((a,b)=>parseInt(a[1].nr)-parseInt(b[1].nr));
  
  return `
    <div class="page-header"><h2>🌾 Kraftfutter</h2><button class="btn-primary" onclick="showKraftfutterForm()">+ Eintrag</button></div>
    <p style="font-size:.78rem;color:var(--text3);margin-bottom:.8rem">Extrakraftfutter pro Kuh erfassen. Tage werden bis Saisonende automatisch gezählt.</p>
    
    <!-- Kühe mit aktivem Kraftfutter -->
    <div class="section-title">Aktuelle Einträge</div>
    <div class="card-list">
      ${kueheList.filter(([id])=>kfProKuh[id]?.length).map(([id,k])=>{
        const eintraege = (kfProKuh[id]||[]).sort((a,b)=>b.datum-a.datum);
        const aktiv = eintraege[0];
        const vonDatum = aktiv?.datum || heute;
        const bisDatum = saisonInfo?.abtriebtDatum || heute;
        const tage = Math.max(0, Math.floor((bisDatum - vonDatum) / 86400000));
        return `<div class="list-card">
          <div class="list-card-left">
            <span class="nr-badge">#${k.nr}</span>
            <div>
              <div class="list-card-title">${k.name||'–'}</div>
              <div class="list-card-sub">seit ${new Date(aktiv.datum).toLocaleDateString('de-AT')} · ${aktiv.menge} kg/Tag</div>
            </div>
          </div>
          <div class="list-card-right">
            <div style="text-align:right">
              <div style="color:var(--gold);font-weight:bold">${tage} Tage</div>
              <div style="font-size:.68rem;color:var(--text3)">${Math.round(tage*aktiv.menge*10)/10} kg gesamt</div>
            </div>
            <button class="btn-xs-danger" onclick="deleteKraftfutter('${aktiv.id||''}','${id}')">✕</button>
          </div>

}

window.showKraftfutterForm = function(kuhId) {
  const ov = document.getElementById('kf-overlay');
  if(!ov){navigate('kraftfutter');setTimeout(()=>showKraftfutterForm(kuhId),150);return;}
  if(kuhId) document.getElementById('kf-kuh').value=kuhId;
  ov.style.display='flex';
};

window.saveKraftfutter = async function() {
  const kuhId = document.getElementById('kf-kuh')?.value;
  const menge = parseFloat(document.getElementById('kf-menge')?.value);
  const datum = document.getElementById('kf-datum')?.value;
  if(!kuhId){alert('Kuh wählen');return;}
  if(!menge||menge<=0){alert('Menge eingeben');return;}
  const id = await push(ref(db,'kraftfutter'),{kuhId,datum:new Date(datum).getTime(),menge,notiz:document.getElementById('kf-notiz')?.value.trim()||'',createdAt:Date.now()});
  closeForm('kf-overlay');
};

window.deleteKraftfutter = async function(id, kuhId) {
  if(!id) {
    // Find by kuhId
    const entry = Object.entries(kraftfutter).find(([,kf])=>kf.kuhId===kuhId);
    if(entry) id = entry[0];
  }
  if(id && confirm('Eintrag löschen?')) await remove(ref(db,'kraftfutter/'+id));
};

let _zaehlungAnimShown = false;
window._showZaehlungAnim = function() {
  if(_zaehlungAnimShown) return;
  _zaehlungAnimShown = true;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .3s ease';
  overlay.innerHTML = `
    <style>
      @keyframes hirteRun{0%{transform:translateX(-120px)}100%{transform:translateX(120px)}}
      @keyframes kuhRun{0%{transform:translateX(-180px)}100%{transform:translateX(60px)}}
      @keyframes fadeInAnim{from{opacity:0}to{opacity:1}}
      @keyframes fadeOutAnim{from{opacity:1}to{opacity:0}}
      .hirte-scene{position:relative;width:300px;height:120px;overflow:hidden;}
      .hirte{position:absolute;bottom:10px;font-size:3rem;animation:hirteRun 1.8s ease-in-out infinite alternate;}
      .kuh{position:absolute;bottom:8px;font-size:2.5rem;animation:kuhRun 1.8s ease-in-out infinite alternate;animation-delay:.1s;}
      .grass{position:absolute;bottom:0;left:0;right:0;height:20px;background:linear-gradient(transparent,rgba(77,184,78,.2));border-radius:0 0 8px 8px}
    </style>
    <div style="font-size:.9rem;color:var(--text3);margin-bottom:1rem;animation:fadeInAnim .5s ease">Zählung wird gestartet…</div>
    <div class="hirte-scene">
      <div class="kuh">🐄</div>
      <div class="hirte">🧑‍🌾</div>
      <div class="grass"></div>
    </div>
    <div style="font-size:1.8rem;margin-top:1rem">✓</div>
  `;
  document.body.appendChild(overlay);
  setTimeout(()=>{
    overlay.style.animation='fadeOutAnim .4s ease forwards';
    setTimeout(()=>{overlay.remove();_zaehlungAnimShown=false;},400);
  }, 2000);
};

// Hook into navigate for zaehlung
const _origNavigate = window.navigate;
window.navigate = function(view) {
  if(view==='zaehlung' && currentView!=='zaehlung') {
    window._showZaehlungAnim();
    setTimeout(()=>_origNavigate(view), 300);
    return;
  }
  _origNavigate(view);
};


window.saveAlmName = async function() {
  const name = document.getElementById('einst-almname')?.value.trim();
  if(!name){alert('Almname eingeben');return;}
  await update(ref(db,'saison'), {alm: name});
  alert('✓ Almname gespeichert');
};
window.saveAlmEinstellungen = async function() {
  const alm = document.getElementById('einst-almname')?.value.trim();
  const jahr = parseInt(document.getElementById('einst-almjahr')?.value)||new Date().getFullYear();
  const updates = {};

window.berechneWartezeiten = function() {
  const datum = document.getElementById('b-datum')?.value;
  if(!datum) return;
  const basis = new Date(datum);
  const zeit = document.getElementById('b-behandlung-zeit')?.value || 'morgen';
  const milchTage = parseInt(document.getElementById('b-wz-milch-tage')?.value)||0;
  const fleischTage = parseInt(document.getElementById('b-wz-fleisch-tage')?.value)||0;
  if(milchTage > 0) {
    const end = new Date(basis); end.setDate(end.getDate() + milchTage);
    const el = document.getElementById('b-wz-milch'); if(el) el.value = isoDate(end);
    const hint = document.getElementById('b-wz-milch-hint');
    if(hint) hint.textContent = '(' + (zeit==='morgen'?'endet morgens':'endet abends') + ')';
  }
  if(fleischTage > 0) {
    const end = new Date(basis); end.setDate(end.getDate() + fleischTage);
    const el = document.getElementById('b-wz-fleisch'); if(el) el.value = isoDate(end);
    const hint = document.getElementById('b-wz-fleisch-hint');
    if(hint) hint.textContent = '(' + (zeit==='morgen'?'endet morgens':'endet abends') + ')';
  }
};

window.saveVorzeitigAbtrieb = async function(kuhId) {

  });
